<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>AI Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../style.css">
</head>

<body>

<h1>🤖 AI TEST</h1>

<p>Simulera DX-analys</p>

<textarea id="input" placeholder="Skriv frekvens + info"></textarea>

<button onclick="analysera()">Analysera</button>

<p id="resultat"></p>

<br>
<button onclick="location.href='../testcenter.html'">⬅️ Tillbaka</button>

<script>
function analysera() {
    let data = document.getElementById("input").value;
    document.getElementById("resultat").innerText =
    "AI ANALYS:\nTrolig station baserat på: " + data;
}
</script>

</body>
</html>
