<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DX-OS Testcenter V6</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0f1a;
    color:white;
    text-align:center;
}
h1 { margin:15px; }

.section {
    margin:15px auto;
    max-width:800px;
    background:#111827;
    padding:15px;
    border-radius:15px;
}

.tab {
    padding:12px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#1f2937;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
.active {
    background:#22c55e;
    color:black;
}

.search {
    width:90%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin:10px;
}

.btn {
    width:90%;
    padding:12px;
    margin:6px;
    border-radius:10px;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.main { background:#eab308; color:black; }
.open { background:#38bdf8; color:black; }
.ai { background:#a855f7; color:white; }

.preview {
    width:100%;
    height:400px;
    border:none;
    border-radius:10px;
    background:white;
}

.status {
    color:#9ecfff;
    margin:10px;
}
</style>
</head>

<body>

<h1>DX-OS TESTCENTER V6</h1>

<div class="section">

<button id="lagerBtn" class="tab active">🧪 Lager</button>
<button id="klaraBtn" class="tab">✅ Klara</button>

<br>

<input id="search" class="search" placeholder="Sök namn eller fil...">

<div id="status" class="status">Laddar...</div>

<div id="list"></div>

</div>

<div class="section">
<h3>Förhandsvisning</h3>
<iframe id="preview" class="preview"></iframe>
</div>

<script>

let current = "lager";
let data = [];

const list = document.getElementById("list");
const search = document.getElementById("search");
const preview = document.getElementById("preview");

function setTab(type){
    current = type;
    document.getElementById("lagerBtn").classList.remove("active");
    document.getElementById("klaraBtn").classList.remove("active");

    if(type==="lager"){
        document.getElementById("lagerBtn").classList.add("active");
    } else {
        document.getElementById("klaraBtn").classList.add("active");
    }
}

function load(type){
    setTab(type);

    fetch(type + "/manifest.json?v=" + Date.now())
    .then(r=>r.json())
    .then(d=>{
        data = d;
        render();
        document.getElementById("status").innerText = "Laddat " + data.length + " filer";
    })
    .catch(()=>{
        document.getElementById("status").innerText = "Fel: manifest saknas";
    });
}

function render(){
    let s = search.value.toLowerCase();

    list.innerHTML = "";

    let filtered = data.filter(i =>
        i.name.toLowerCase().includes(s) ||
        i.file.toLowerCase().includes(s)
    );

    if(filtered.length === 0){
        list.innerHTML = "<p>Inga träffar</p>";
        return;
    }

    filtered.forEach(item=>{

        let path = current + "/" + item.file;

        let mainBtn = document.createElement("button");
        mainBtn.className = "btn main";
        mainBtn.innerText = item.name;
        mainBtn.onclick = ()=> preview.src = path;

        let openBtn = document.createElement("button");
        openBtn.className = "btn open";
        openBtn.innerText = "Öppna i ny flik";
        openBtn.onclick = ()=> window.open(path, "_blank");

        let aiBtn = document.createElement("button");
        aiBtn.className = "btn ai";
        aiBtn.innerText = "Analysera";
        aiBtn.onclick = ()=>{
            let url = new URL(path, window.location.href).href;
            window.open("https://chat.openai.com/?q=" + encodeURIComponent("Analysera denna sida: " + url));
        };

        list.appendChild(mainBtn);
        list.appendChild(openBtn);
        list.appendChild(aiBtn);

    });
}

search.addEventListener("input", render);

document.getElementById("lagerBtn").onclick = ()=> load("lager");
document.getElementById("klaraBtn").onclick = ()=> load("klara");

load("lager");

</script>

</body>
</html>
