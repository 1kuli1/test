<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DX LAGER PORTAL</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: white;
  text-align: center;
  padding: 20px;
  margin: 0;
}

h1 {
  color: #38bdf8;
}

.container {
  max-width: 700px;
  margin: auto;
}

input {
  width: 90%;
  padding: 12px;
  margin: 15px 0;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

.file {
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #4ade80;
}
</style>
</head>

<body>

<h1>📂 DX LAGER</h1>

<div class="container">
  <input id="search" placeholder="🔍 Sök fil..." oninput="filterList()">
  <div id="fileList"></div>
</div>

<script>
// ===============================
// DX LAGER PORTAL V1
// ===============================

// Bas-sökväg till lager
const BASE_PATH = "/test/lager/";

// Lista med filer
const files = [
  "dx-listen-pro",
  "ai-popup",
  "testcenter",
  "dxos_pro_system_v2",
  "dx_operations_center"
];

// Bygg lista
function buildList(list) {
  let html = "";

  list.forEach(name => {
    html += `
      <div class="file">
        <button onclick="openPage('${name}')">
          ▶ ${name}
        </button>
      </div>
    `;
  });

  document.getElementById("fileList").innerHTML = html;
}

// Öppna sida
function openPage(name) {
  let file = name.toLowerCase();

  if (!file.endsWith(".html")) {
    file += ".html";
  }

  let url = BASE_PATH + file;

  console.log("Öppnar:", url);
  window.location.href = url;
}

// Sök
function filterList() {
  let search = document.getElementById("search").value.toLowerCase();
  let filtered = files.filter(f => f.toLowerCase().includes(search));
  buildList(filtered);
}

// Init
buildList(files);
</script>

</body>
</html>
