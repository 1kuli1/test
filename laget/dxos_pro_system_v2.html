<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DX-OS PRO v2</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    font-family: Arial;
    background: #0b0f1a;
    color: white;
    margin: 0;
    text-align: center;
}

.container {
    display: flex;
    flex-wrap: wrap;
}

.panel {
    flex: 1;
    min-width: 300px;
    padding: 10px;
}

textarea, input {
    width: 90%;
    padding: 8px;
    margin: 5px;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    background: #eab308;
    cursor: pointer;
}

#map {
    height: 400px;
}
</style>
</head>

<body>

<h1>📡 DX-OS PRO v2</h1>

<div class="container">

<!-- ANALYS -->
<div class="panel">
<h2>Analys</h2>

<input id="freq" placeholder="Frekvens kHz">
<input id="lang" placeholder="Språk (t.ex engelska)">
<textarea id="notes" placeholder="Observationer"></textarea>

<button onclick="analysera()">Analysera</button>

<div id="aiResult"></div>
</div>

<!-- LOGG -->
<div class="panel">
<h2>Logg</h2>
<ul id="logg"></ul>
</div>

<!-- KARTA -->
<div class="panel">
<h2>Karta</h2>
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ================= MAP =================
let map = L.map('map').setView([59.3293, 18.0686], 4);

// karta
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// QTH
let qth = [59.3293, 18.0686];
L.marker(qth).addTo(map).bindPopup("QTH");

// mottagare
let receivers = [
    {name:"Twente", coords:[52.24, 6.85]},
    {name:"UK SDR", coords:[51.5, -0.1]},
    {name:"USA SDR", coords:[40.7, -74.0]}
];

// rita mottagare
receivers.forEach(r => {
    L.marker(r.coords).addTo(map).bindPopup(r.name);
    L.polyline([qth, r.coords], {color:"gray"}).addTo(map);
});

// ================= FAKE STATION DB =================
let stationDB = [
    {name:"BBC", freq:198, lang:"engelska", coords:[51.5, -0.1]},
    {name:"Radio Romania", freq:153, lang:"rumänska", coords:[44.4, 26.1]},
    {name:"Polskie Radio", freq:225, lang:"polska", coords:[52.2, 21.0]},
    {name:"Radio España", freq:684, lang:"spanska", coords:[40.4, -3.7]},
    {name:"Voice of Turkey", freq:5960, lang:"turkiska", coords:[39.9, 32.8]}
];

// ================= LOGG =================
function loadLogg() {
    let data = JSON.parse(localStorage.getItem("dxlogg") || "[]");
    let lista = document.getElementById("logg");
    lista.innerHTML = "";

    data.forEach(item => {
        let li = document.createElement("li");
        li.textContent = item.text;
        lista.appendChild(li);

        // rita på karta
        if(item.coords){
            L.marker(item.coords).addTo(map)
                .bindPopup(item.text);

            L.polyline([qth, item.coords], {color:"yellow"}).addTo(map);
        }
    });
}

// ================= ANALYS =================
function analysera() {

    let freq = parseInt(document.getElementById("freq").value);
    let lang = document.getElementById("lang").value.toLowerCase();

    // hitta kandidater
    let candidates = stationDB.map(st => {
        let score = 0;

        if(Math.abs(st.freq - freq) < 10) score += 50;
        if(st.lang.includes(lang)) score += 30;

        return {...st, score};
    });

    // sortera topp 5
    candidates.sort((a,b) => b.score - a.score);
    let top5 = candidates.slice(0,5);

    // visa
    let html = "<h3>Topp 5:</h3>";
    top5.forEach(c => {
        html += c.name + " (" + c.score + "%)<br>";
    });

    document.getElementById("aiResult").innerHTML = html;

    // bästa kandidat
    let best = top5[0];

    // rita station
    L.marker(best.coords).addTo(map)
        .bindPopup("Trolig: " + best.name);

    L.polyline([qth, best.coords], {color:"red"}).addTo(map);

    // spara i logg
    let logEntry = {
        text: new Date().toLocaleString() + " | " + freq + " kHz | " + best.name,
        coords: best.coords
    };

    let data = JSON.parse(localStorage.getItem("dxlogg") || "[]");
    data.push(logEntry);
    localStorage.setItem("dxlogg", JSON.stringify(data));

    loadLogg();
}

loadLogg();

</script>

</body>
</html>
<script src="notebook.js"></script>
