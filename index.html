<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SÖKTEST V7</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
    text-align: center;
}
.wrap {
    max-width: 700px;
    margin: 20px auto;
    background: #111827;
    padding: 20px;
    border-radius: 14px;
}
button {
    width: 90%;
    max-width: 500px;
    padding: 12px;
    margin: 8px auto;
    display: block;
    border: none;
    border-radius: 10px;
    background: #eab308;
    color: black;
    font-weight: bold;
    font-size: 16px;
}
.tab {
    width: auto;
    display: inline-block;
    margin: 5px;
    background: #1f2937;
    color: white;
}
.active {
    background: #22c55e;
    color: black;
}
input {
    width: 90%;
    max-width: 500px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin: 10px 0;
    font-size: 16px;
}
#debug {
    color: #7dd3fc;
    margin: 10px 0;
    font-size: 14px;
}
#status {
    color: #fca5a5;
    margin: 10px 0;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="wrap">
    <h1>SÖKTEST V7</h1>

    <button id="lagerBtn" class="tab active" onclick="loadFolder('lager')">Lager</button>
    <button id="klaraBtn" class="tab" onclick="loadFolder('klara')">Klara</button>

    <div>
        <input type="text" id="search" placeholder="Skriv här för att söka...">
    </div>

    <div id="debug">Debug: väntar</div>
    <div id="status">Status: laddar...</div>

    <div id="list"></div>
</div>

<script>
let allFiles = [];
let currentFolder = "lager";

const searchInput = document.getElementById("search");
const list = document.getElementById("list");
const debug = document.getElementById("debug");
const status = document.getElementById("status");

function setActive(folder) {
    document.getElementById("lagerBtn").classList.remove("active");
    document.getElementById("klaraBtn").classList.remove("active");

    if (folder === "lager") {
        document.getElementById("lagerBtn").classList.add("active");
    } else {
        document.getElementById("klaraBtn").classList.add("active");
    }
}

function loadFolder(folder) {
    currentFolder = folder;
    setActive(folder);
    status.textContent = "Status: laddar " + folder + "...";

    fetch(folder + "/manifest.json?v=" + Date.now())
        .then(response => {
            if (!response.ok) {
                throw new Error("Kunde inte läsa " + folder + "/manifest.json");
            }
            return response.json();
        })
        .then(data => {
            allFiles = Array.isArray(data) ? data : [];
            status.textContent = "Status: laddat " + allFiles.length + " filer i " + folder;
            renderList();
        })
        .catch(error => {
            allFiles = [];
            list.innerHTML = "";
            status.textContent = "Status: FEL - " + error.message;
        });
}

function renderList() {
    const q = searchInput.value.toLowerCase().trim();
    debug.textContent = 'Debug: söktext = "' + q + '" | filer = ' + allFiles.length;

    const filtered = allFiles.filter(item => {
        const name = (item.name || "").toLowerCase();
        const file = (item.file || "").toLowerCase();
        return name.includes(q) || file.includes(q);
    });

    list.innerHTML = "";

    if (filtered.length === 0) {
        list.innerHTML = "<p>Inga träffar</p>";
        return;
    }

    filtered.forEach(item => {
        const btn = document.createElement("button");
        btn.textContent = item.name + " (" + item.file + ")";
        btn.onclick = () => {
            window.location.href = currentFolder + "/" + item.file;
        };
        list.appendChild(btn);
    });
}

searchInput.addEventListener("input", renderList);

loadFolder("lager");
</script>

</body>
</html>
