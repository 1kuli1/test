<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Karta Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map { height: 90vh; }
</style>

</head>

<body>

<h1>🗺️ KARTA TEST</h1>

<div id="map"></div>

<button onclick="location.href='../testcenter.html'">⬅️ Tillbaka</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([59.3293, 18.0686], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OSM'
}).addTo(map);

L.marker([59.3293, 18.0686]).addTo(map)
    .bindPopup("Din position (test)")
    .openPopup();
</script>

</body>
</html>
